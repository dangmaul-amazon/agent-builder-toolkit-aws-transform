[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
]
ignore = [
    "E501", # line too long — let formatter handle this later
]

[tool.ruff.lint.isort]
known-first-party = [
    "agent_builder_sdk",
    "agent_builder_mcp",
    "agent_builder_mcp_client",
    "agent_builder_types",
]
