[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-builder-agentic-mcp-aws-transform"
version = "1.0.0"
description = "MCP server that agents built with the Agent Builder SDK use at runtime to talk to AWS Transform"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "AWS Transform Team" }]
license = "Apache-2.0"
license-files = ["LICEN[CS]E*", "NOTICE*", "THIRD-PARTY-NOTICES.txt"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Operating System :: OS Independent",
]
dependencies = [
    "mcp>=1.0",
    "anyio>=4.0",
    "boto3>=1.28",
    "botocore>=1.28",
    "requests>=2.28",
    "structlog>=25.0",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
test = ["pytest", "pytest-asyncio", "trio"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[project.scripts]
agent-builder-agentic-mcp = "agent_builder_agentic_mcp.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
agent_builder_agentic_mcp = ["py.typed"]
