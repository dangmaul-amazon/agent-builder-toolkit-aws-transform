[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-builder-mcp-aws-transform"
version = "1.0.0"
description = "MCP server for building, deploying, and managing agents on AWS Transform"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "AWS Transform Team" }]
license = "Apache-2.0"
license-files = ["LICEN[CS]E*"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
dependencies = [
    "mcp>=1.0",
    "anyio>=4.0",
    "rank-bm25>=0.2",
    "snowballstemmer>=2.0",
    "boto3>=1.28",
    "requests>=2.28",
]

[project.optional-dependencies]
test = ["pytest", "hypothesis"]

[project.scripts]
agent-builder-mcp = "agent_builder_mcp.server:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
agent_builder_mcp = ["knowledge/data/*.md", "knowledge/data/*.json"]
